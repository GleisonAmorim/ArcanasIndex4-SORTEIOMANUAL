<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Sorteio</title>

    <style>

html,
body{
    margin:0;
    padding:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

body{
    background:url("principal.gif") center center no-repeat;
    background-size:contain;
    background-color:black;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    text-align:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card-container{
    position:absolute;
    top:100px;
    left:100px;
    width:180px;
    height:320px;
    perspective:1000px;
    cursor:grab;
}

.card-container:active{
    cursor:grabbing;
}

.card{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
    transition:transform 1.5s ease-in-out;
    transform:rotateY(180deg);
}

.card.is-flipped{
    transform:rotateY(0deg);
}

.card-face{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
}

.card-back{
    background:url("fd2.jpg");
    background-size:cover;
    background-position:center;
    transform:rotateY(180deg);
}

.card-front img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:10px;
}

.button-overlay{
    position:absolute;
    width:100%;
    height:100%;
    border:none;
    background:transparent;
    cursor:pointer;
}

#btnVirarCostas{
    position:fixed;
    right:10px;
    top:10px;
    z-index:999;
    background:rgba(0,0,0,.7);
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
}

#btnEscolher{
    position:fixed;
    left:10px;
    top:10px;
    z-index:999;
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

#btnSortear{
    position:fixed;
    left:10px;
    top:60px;
    z-index:999;
    background:#673ab7;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

#infoCarta{
    position:fixed;
    bottom:10px;
    right:10px;
    color:white;
    background:rgba(0,0,0,.6);
    padding:10px;
    border-radius:10px;
    font-size:12px;
}

    </style>

</head>

<body>

<button id="btnVirarCostas" onclick="virarParaCostas()">🔄</button>

<button id="btnEscolher"
onclick="document.getElementById('arquivoCarta').click()">
Escolher Carta
</button>

<button id="btnSortear"
onclick="sortearCarta()">
Sortear
</button>

<input
type="file"
id="arquivoCarta"
accept="image/*"
style="display:none"
onchange="carregarCarta(event)">

<audio
id="somSorteio"
src="ms.mp3"
preload="auto">
</audio>

<div class="container">

<div class="card-container">

<div class="card" id="card">

<div class="card-face card-back"></div>

<div class="card-face card-front">

<img
id="card-image"
src=""
alt="Carta">

</div>

</div>

<button class="button-overlay"
onclick="sortearCarta()">
</button>

</div>

</div>

<div id="infoCarta">
Nenhuma carta selecionada.
</div>

<script src="script.js"></script>

</body>

</html>
